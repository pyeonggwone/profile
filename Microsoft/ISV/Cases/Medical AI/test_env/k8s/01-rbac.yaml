apiVersion: v1
kind: ServiceAccount
metadata:
  name: remote-update-agent
  namespace: medical-ai-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remote-update-agent
  namespace: medical-ai-test
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remote-update-agent
  namespace: medical-ai-test
subjects:
  - kind: ServiceAccount
    name: remote-update-agent
    namespace: medical-ai-test
roleRef:
  kind: Role
  name: remote-update-agent
  apiGroup: rbac.authorization.k8s.io